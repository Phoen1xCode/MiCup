turn_speed_dps = 30.0     # 转弯角速度 (°/s)
exit_speed = 0.15         # 出弯速度 (m/s)
exit_distance = 1.5       # 出弯直走距离 (m)
max_time = 45.0           # 赛段总超时 (s)

