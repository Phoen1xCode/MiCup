stabilize_time = 1.2      # 原地稳定
forward_speed = 0.5      # 直走速度 (m/s)，石板路保守
straight_distance = 1.5   # 起点到弯道距离 (m)
turn_direction = 1.0      # 转弯方向：1.0=左转，-1.0=右转
