# 各赛段速度/距离阈值/超时。本计划只填 Stage 1，后续计划补充 2-6。
# 所有数值为 Gazebo 保守初值，进仿真后逐段调参。

[stage1]
# 石径探路：开环行走 + TickMotion
# 石板宽 30cm，高 5cm，间隔 20cm
